<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑑定理論 Viewer</title>

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:system-ui,"Hiragino Sans","Yu Gothic",sans-serif;
  line-height:1.9;
}
section{
  min-height:100vh;
  padding:42px 24px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
  border-bottom:1px solid #333;
}
.title{
  background:linear-gradient(160deg,#ff003c,#4b00ff);
}
.cardA{background:#101010;}
.cardB{background:#160022;}
.cardC{background:#001f1d;}
.heading{
  text-align:center;
  background:linear-gradient(160deg,#ffcc00,#ff003c);
}
h1{
  font-size:34px;
  line-height:1.25;
}
.text{
  font-size:22px;
  font-weight:750;
}
.headingText{
  font-size:34px;
  font-weight:950;
  line-height:1.35;
}
.redsheet{
  background:#ff1744;
  color:transparent;
  border-radius:8px;
  padding:2px 8px;
  cursor:pointer;
  user-select:none;
  box-shadow:0 0 12px rgba(255,23,68,.7);
}
.redsheet.open{
  background:transparent;
  color:#00ffcc;
  font-weight:900;
  box-shadow:none;
}
details{
  background:#1b1b1b;
  border:1px solid #444;
  border-radius:14px;
  padding:16px;
  margin-top:20px;
}
summary{
  color:#ffeb3b;
  font-weight:900;
  font-size:20px;
  cursor:pointer;
}
.nav{
  position:fixed;
  right:12px;
  bottom:12px;
  background:#00ffcc;
  color:#000;
  padding:10px 14px;
  border-radius:999px;
  font-weight:900;
  text-decoration:none;
  z-index:99;
}
.error{
  color:#ff4d6d;
  font-weight:900;
}
</style>
</head>

<body>

<a class="nav" href="./">一覧へ</a>

<section class="title">
  <h1 id="title">読み込み中...</h1>
  <p class="text">
    SEPでカード分割。<br>
    SS〜EEは赤シート。<br>
    赤シートなしカードは見出し表示。
  </p>
</section>

<div id="content"></div>

<script>
const params = new URLSearchParams(location.search);
const no = params.get("no") || "1";

document.title = `論点 ${no}`;
document.getElementById("title").innerHTML = `論点 ${no}`;

function escapeHtml(str){
  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function toMaskedHtml(text){
  return escapeHtml(text)
    .replace(/\n/g,"<br><br>")
    .replace(/SS(.*?)EE/g,
      `<span class="redsheet" onclick="this.classList.toggle('open')">$1</span>`
    );
}

function toPlainHtml(text){
  return escapeHtml(text.replace(/SS|EE/g,""))
    .replace(/\n/g,"<br><br>");
}

fetch(`data/${no}.txt`)
.then(res => {
  if(!res.ok) throw new Error(`data/${no}.txt が見つかりません`);
  return res.text();
})
.then(rawText => {
  const content = document.getElementById("content");

  const blocks = rawText
    .split("SEP")
    .map(block => block.trim())
    .filter(block => block.length > 0);

  blocks.forEach((block, index) => {
    const hasRedSheet = /SS[\s\S]*?EE/.test(block);

    const section = document.createElement("section");

    if(!hasRedSheet){
      section.className = "heading";
      section.innerHTML = `
        <div class="headingText">
          ${toPlainHtml(block)}
        </div>
      `;
    }else{
      const cardClasses = ["cardA","cardB","cardC"];
      section.className = cardClasses[index % cardClasses.length];

      section.innerHTML = `
        <div class="text">
          ${toMaskedHtml(block)}
        </div>

        <details>
          <summary>原文を見る</summary>
          <div>${toPlainHtml(block)}</div>
        </details>
      `;
    }

    content.appendChild(section);
  });
})
.catch(err => {
  document.getElementById("content").innerHTML = `
    <section class="cardA">
      <p class="text error">${escapeHtml(err.message)}</p>
    </section>
  `;
});
</script>

</body>
</html>
