<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑑定理論 Viewer</title>

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:system-ui,"Hiragino Sans","Yu Gothic",sans-serif;
  line-height:1.9;
}
section{
  min-height:100vh;
  padding:42px 24px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
  border-bottom:1px solid #333;
}
.title{background:linear-gradient(160deg,#ff003c,#4b00ff);}
.cardA{background:#101010;}
.cardB{background:#160022;}
.cardC{background:#001f1d;}
.heading{
  text-align:center;
  background:linear-gradient(160deg,#ffcc00,#ff003c);
}
h1{font-size:34px;line-height:1.25;}
h2{color:#ffeb3b;}
.text{font-size:22px;font-weight:750;}
.headingText{font-size:34px;font-weight:950;line-height:1.35;}
.redsheet{
  background:#ff1744;
  color:transparent;
  border-radius:8px;
  padding:2px 8px;
  cursor:pointer;
  user-select:none;
  box-shadow:0 0 12px rgba(255,23,68,.7);
}
.redsheet.open{
  background:transparent;
  color:#00ffcc;
  font-weight:900;
  box-shadow:none;
}
details{
  background:#1b1b1b;
  border:1px solid #444;
  border-radius:14px;
  padding:16px;
  margin-top:20px;
}
summary{
  color:#ffeb3b;
  font-weight:900;
  font-size:20px;
  cursor:pointer;
}
textarea{
  width:100%;
  min-height:140px;
  margin-top:20px;
  padding:14px;
  box-sizing:border-box;
  border-radius:14px;
  border:2px solid #333;
  background:#050505;
  color:white;
  font-size:18px;
  line-height:1.7;
}
button{
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#00ffcc;
  color:#000;
  font-weight:900;
  font-size:18px;
}
.result{
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:#222;
  font-weight:900;
}
.good{color:#00ffcc;}
.bad{color:#ff4d6d;}
.nav{
  position:fixed;
  right:12px;
  bottom:12px;
  background:#00ffcc;
  color:#000;
  padding:10px 14px;
  border-radius:999px;
  font-weight:900;
  text-decoration:none;
  z-index:99;
}
</style>
</head>

<body>

<a class="nav" href="./">一覧へ</a>

<section class="title">
  <h1 id="title">読み込み中...</h1>
  <p class="text">
    赤シート → 全入力 → 採点。<br>
    最後にChatGPT採点用レポートも作れる。
  </p>
</section>

<div id="content"></div>

<section class="cardA">
  <h2>結果レポート</h2>
  <button onclick="showReport()">結果レポートを表示</button>
  <button onclick="copyForChatGPT()">ChatGPT採点用テキストをコピー</button>
  <div id="report" class="text"></div>
</section>

<script>
const params = new URLSearchParams(location.search);
const no = params.get("no") || "1";

document.title = `論点 ${no}`;
document.getElementById("title").innerHTML = `論点 ${no}`;

const answers = [];
const results = [];

function escapeHtml(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function normalize(str){
  return str.replace(/\s/g,"").replace(/[、。，．・「」『』（）()]/g,"");
}

function toMaskedHtml(text){
  return escapeHtml(text)
    .replace(/\n/g,"<br><br>")
    .replace(/SS(.*?)EE/g,
      `<span class="redsheet" onclick="this.classList.toggle('open')">$1</span>`
    );
}

function toPlainText(text){
  return text.replace(/SS|EE/g,"");
}

function extractKeywords(text){
  const matches = [...text.matchAll(/SS([\s\S]*?)EE/g)];
  return matches.map(m => m[1].trim()).filter(Boolean);
}

fetch(`data/${no}.txt`)
.then(res => {
  if(!res.ok) throw new Error(`data/${no}.txt が見つかりません`);
  return res.text();
})
.then(rawText => {
  const blocks = rawText.split("SEP").map(b => b.trim()).filter(Boolean);
  const content = document.getElementById("content");

  blocks.forEach((block, index) => {
    const hasRedSheet = /SS[\s\S]*?EE/.test(block);
    const section = document.createElement("section");

    if(!hasRedSheet){
      section.className = "heading";
      section.innerHTML = `<div class="headingText">${escapeHtml(block).replace(/\n/g,"<br>")}</div>`;
      content.appendChild(section);
      return;
    }

    const plain = toPlainText(block);
    const keywords = extractKeywords(block);
    const answerIndex = answers.length;

    answers.push({
      blockNo: answerIndex + 1,
      plain,
      keywords,
      userInput:"",
      score:null,
      missed:[]
    });

    const cardClasses = ["cardA","cardB","cardC"];
    section.className = cardClasses[index % cardClasses.length];

    section.innerHTML = `
      <h2>ブロック ${answerIndex + 1}</h2>

      <div class="text">${toMaskedHtml(block)}</div>

      <details>
        <summary>原文を見る</summary>
        <div>${escapeHtml(plain).replace(/\n/g,"<br><br>")}</div>
      </details>

      <textarea id="input-${answerIndex}" placeholder="ここに思い出して入力"></textarea>

      <button onclick="scoreBlock(${answerIndex})">このブロックを採点</button>

      <div id="result-${answerIndex}" class="result"></div>
    `;

    content.appendChild(section);
  });

  loadHistory();
});
  
function scoreBlock(i){
  const input = document.getElementById(`input-${i}`).value;
  const data = answers[i];

  data.userInput = input;

  const normalizedInput = normalize(input);
  const missed = [];

  data.keywords.forEach(kw => {
    if(!normalizedInput.includes(normalize(kw))){
      missed.push(kw);
    }
  });

  const total = data.keywords.length;
  const hit = total - missed.length;
  const score = total === 0 ? 100 : Math.round(hit / total * 100);

  data.score = score;
  data.missed = missed;

  const result = document.getElementById(`result-${i}`);

  result.innerHTML = `
    <div class="${score >= 80 ? "good" : "bad"}">
      ${score}点 / キーワード ${hit}/${total}
    </div>
    ${
      missed.length
      ? `<div class="bad">不足：${missed.map(escapeHtml).join("、")}</div>`
      : `<div class="good">主要キーワードOK</div>`
    }
  `;

  saveHistory();
}

function showReport(){
  const done = answers.filter(a => a.score !== null);
  if(done.length === 0){
    document.getElementById("report").innerHTML = "まだ採点結果がありません。";
    return;
  }

  const avg = Math.round(done.reduce((sum,a)=>sum+a.score,0) / done.length);

  let html = `<p>平均点：<span class="${avg>=80?'good':'bad'}">${avg}点</span></p>`;

  done.forEach(a => {
    html += `
      <details>
        <summary>ブロック ${a.blockNo}：${a.score}点</summary>
        <p>不足：${a.missed.length ? a.missed.map(escapeHtml).join("、") : "なし"}</p>
        <p><strong>入力答案：</strong><br>${escapeHtml(a.userInput).replace(/\n/g,"<br>")}</p>
      </details>
    `;
  });

  document.getElementById("report").innerHTML = html;
}

function copyForChatGPT(){
  let text = `以下は不動産鑑定士試験の暗記答案です。厳しめに採点し、足りないキーワード、表現のズレ、改善答案を示してください。\n\n`;
  text += `【論点番号】${no}\n\n`;

  answers.forEach(a => {
    text += `---\n`;
    text += `【ブロック${a.blockNo} 原文】\n${a.plain}\n\n`;
    text += `【私の答案】\n${a.userInput || "未入力"}\n\n`;
    text += `【自己採点】${a.score === null ? "未採点" : a.score + "点"}\n`;
    text += `【不足キーワード】${a.missed.length ? a.missed.join("、") : "なし"}\n\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    alert("ChatGPT採点用テキストをコピーしました");
  });
}

function saveHistory(){
  const key = `riron-${no}-history`;
  localStorage.setItem(key, JSON.stringify({
    savedAt:new Date().toISOString(),
    answers
  }));
}

function loadHistory(){
  const key = `riron-${no}-history`;
  const saved = localStorage.getItem(key);
  if(!saved) return;

  try{
    const data = JSON.parse(saved);
    data.answers.forEach((a,i)=>{
      if(!answers[i]) return;
      answers[i].userInput = a.userInput || "";
      answers[i].score = a.score;
      answers[i].missed = a.missed || [];

      const input = document.getElementById(`input-${i}`);
      if(input) input.value = answers[i].userInput;

      if(a.score !== null){
        const result = document.getElementById(`result-${i}`);
        if(result){
          result.innerHTML = `
            <div class="${a.score >= 80 ? "good" : "bad"}">
              前回保存：${a.score}点
            </div>
          `;
        }
      }
    });
  }catch(e){}
}
</script>

</body>
</html>
