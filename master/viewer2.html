<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑑定理論タイピングテスト</title>

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:system-ui,"Hiragino Sans","Yu Gothic",sans-serif;
  line-height:1.8;
}
section{
  min-height:100vh;
  padding:42px 24px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
  border-bottom:1px solid #333;
}
.title{background:linear-gradient(160deg,#ff003c,#4b00ff);}
.cardA{background:#101010;}
.cardB{background:#160022;}
.cardC{background:#001f1d;}
.heading{
  text-align:center;
  background:linear-gradient(160deg,#ffcc00,#ff003c);
}
h1{font-size:34px;line-height:1.25;}
h2{color:#ffeb3b;}
.text{font-size:21px;font-weight:750;}
.headingText{font-size:34px;font-weight:950;line-height:1.35;}
textarea{
  width:100%;
  min-height:180px;
  margin-top:20px;
  padding:14px;
  box-sizing:border-box;
  border-radius:14px;
  border:2px solid #333;
  background:#050505;
  color:white;
  font-size:18px;
  line-height:1.7;
}
button{
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#00ffcc;
  color:#000;
  font-weight:900;
  font-size:18px;
}
.result{
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:#222;
  font-weight:900;
}
.hit{color:#fff;font-weight:900;}
.miss{color:#ff4d6d;font-weight:900;text-decoration:underline;}
.extra{color:#00ffcc;font-weight:900;}
.good{color:#00ffcc;}
.bad{color:#ff4d6d;}
.compareBox{
  margin-top:16px;
  padding:14px;
  border-radius:14px;
  background:#111;
  border:1px solid #444;
  font-size:18px;
  line-height:1.9;
}
details{
  background:#1b1b1b;
  border:1px solid #444;
  border-radius:14px;
  padding:16px;
  margin-top:20px;
}
summary{
  color:#ffeb3b;
  font-weight:900;
  font-size:20px;
  cursor:pointer;
}
.nav{
  position:fixed;
  right:12px;
  bottom:12px;
  background:#00ffcc;
  color:#000;
  padding:10px 14px;
  border-radius:999px;
  font-weight:900;
  text-decoration:none;
  z-index:99;
}
</style>
</head>

<body>

<a class="nav" href="./">一覧へ</a>

<section class="title">
  <h1 id="title">読み込み中...</h1>
  <p class="text">
    SEPごとにブロック化。<br>
    SS / EE は自動で読み飛ばし。<br>
    本文を覚えて入力し、採点。
  </p>
</section>

<div id="content"></div>

<section class="cardA">
  <h2>結果レポート</h2>
  <button onclick="showReport()">結果レポートを表示</button>
  <button onclick="copyForChatGPT()">ChatGPT採点用テキストをコピー</button>
  <div id="report" class="text"></div>
</section>

<script>
const params = new URLSearchParams(location.search);
const no = params.get("no") || "1";

document.title = `論点 ${no}`;
document.getElementById("title").innerHTML = `論点 ${no}`;

const blocksData = [];

function stripMarks(str){
  return str.replace(/SS|EE/g,"");
}

function escapeHtml(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function normalize(str){
  return stripMarks(str)
    .replace(/\s/g,"")
    .replace(/[、。，．・「」『』（）()]/g,"")
    .replace(/　/g,"");
}

function splitUnits(str){
  return normalize(str).split("");
}

function compareText(original, input){
  const o = splitUnits(original);
  const u = splitUnits(input);

  let hit = 0;
  let resultHtml = "";

  const max = Math.max(o.length, u.length);

  for(let i=0;i<max;i++){
    const originalChar = o[i] || "";
    const inputChar = u[i] || "";

    if(originalChar && inputChar && originalChar === inputChar){
      hit++;
      resultHtml += `<span class="hit">${escapeHtml(originalChar)}</span>`;
    }else if(originalChar){
      resultHtml += `<span class="miss">${escapeHtml(originalChar)}</span>`;
    }else if(inputChar){
      resultHtml += `<span class="extra">${escapeHtml(inputChar)}</span>`;
    }
  }

  const rate = o.length === 0 ? 100 : Math.round(hit / o.length * 100);

  return {rate, hit, total:o.length, resultHtml};
}

fetch(`data/${no}.txt`)
.then(res => {
  if(!res.ok) throw new Error(`data/${no}.txt が見つかりません`);
  return res.text();
})
.then(rawText => {
  const blocks = rawText
    .split("SEP")
    .map(b => b.trim())
    .filter(Boolean);

  const content = document.getElementById("content");

  blocks.forEach((rawBlock, index) => {
    const block = stripMarks(rawBlock);
    const section = document.createElement("section");

    if(block.length <= 40 && !/[。！？]/.test(block)){
      section.className = "heading";
      section.innerHTML = `<div class="headingText">${escapeHtml(block).replace(/\n/g,"<br>")}</div>`;
      content.appendChild(section);
      return;
    }

    const dataIndex = blocksData.length;
    blocksData.push({
      blockNo:dataIndex + 1,
      original:block,
      rawOriginal:rawBlock,
      userInput:"",
      score:null
    });

    const cardClasses = ["cardA","cardB","cardC"];
    section.className = cardClasses[index % cardClasses.length];

    section.innerHTML = `
      <h2>ブロック ${dataIndex + 1}</h2>

      <details open>
        <summary>暗記対象本文</summary>
        <div class="text">${escapeHtml(block).replace(/\n/g,"<br><br>")}</div>
      </details>

      <textarea id="input-${dataIndex}" placeholder="ここに思い出して入力"></textarea>

      <button onclick="scoreBlock(${dataIndex})">このブロックを採点</button>

      <div id="result-${dataIndex}" class="result"></div>
    `;

    content.appendChild(section);
  });

  loadHistory();
})
.catch(err => {
  document.getElementById("content").innerHTML = `
    <section class="cardA">
      <p class="text bad">${escapeHtml(err.message)}</p>
    </section>
  `;
});

function scoreBlock(i){
  const input = document.getElementById(`input-${i}`).value;
  const data = blocksData[i];

  const compare = compareText(data.original, input);

  data.userInput = input;
  data.score = compare.rate;

  const result = document.getElementById(`result-${i}`);

  result.innerHTML = `
    <div class="${compare.rate >= 80 ? "good" : "bad"}">
      ${compare.rate}点 / 一致 ${compare.hit}/${compare.total}
    </div>

    <div class="compareBox">
      <strong>原文ベース比較：</strong><br>
      ${compare.resultHtml}
    </div>
  `;

  saveHistory();
}

function showReport(){
  const done = blocksData.filter(b => b.score !== null);

  if(done.length === 0){
    document.getElementById("report").innerHTML = "まだ採点結果がありません。";
    return;
  }

  const avg = Math.round(done.reduce((sum,b)=>sum+b.score,0) / done.length);

  let html = `<p>平均点：<span class="${avg>=80?'good':'bad'}">${avg}点</span></p>`;

  done.forEach(b => {
    html += `
      <details>
        <summary>ブロック ${b.blockNo}：${b.score}点</summary>
        <p><strong>原文：</strong><br>${escapeHtml(b.original).replace(/\n/g,"<br>")}</p>
        <p><strong>入力：</strong><br>${escapeHtml(b.userInput).replace(/\n/g,"<br>")}</p>
      </details>
    `;
  });

  document.getElementById("report").innerHTML = html;
}

function copyForChatGPT(){
  let text = `以下は不動産鑑定士試験の暗記答案です。原文と私の入力を比較し、厳しめに採点してください。重要語句の抜け、表現のズレ、改善答案を示してください。\n\n`;
  text += `【論点番号】${no}\n\n`;

  blocksData.forEach(b => {
    text += `---\n`;
    text += `【ブロック${b.blockNo} 原文】\n${b.original}\n\n`;
    text += `【私の入力】\n${b.userInput || "未入力"}\n\n`;
    text += `【簡易採点】${b.score === null ? "未採点" : b.score + "点"}\n\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    alert("ChatGPT採点用テキストをコピーしました");
  });
}

function saveHistory(){
  localStorage.setItem(`riron-typing-${no}`, JSON.stringify({
    savedAt:new Date().toISOString(),
    blocksData
  }));
}

function loadHistory(){
  const saved = localStorage.getItem(`riron-typing-${no}`);
  if(!saved) return;

  try{
    const data = JSON.parse(saved);
    data.blocksData.forEach((b,i)=>{
      if(!blocksData[i]) return;

      blocksData[i].userInput = b.userInput || "";
      blocksData[i].score = b.score;

      const input = document.getElementById(`input-${i}`);
      if(input) input.value = blocksData[i].userInput;

      const result = document.getElementById(`result-${i}`);
      if(result && b.score !== null){
        result.innerHTML = `<div class="${b.score >= 80 ? "good" : "bad"}">前回保存：${b.score}点</div>`;
      }
    });
  }catch(e){}
}
</script>

</body>
</html>
