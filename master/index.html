<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑑定理論</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(160deg,#050505,#2a0055);
  color:white;
  font-family:system-ui,"Hiragino Sans","Yu Gothic",sans-serif;
}
.box{
  width:90%;
  max-width:420px;
  padding:30px;
  background:#111;
  border:2px solid #00ffcc;
  border-radius:24px;
  box-shadow:0 0 40px rgba(0,255,204,.3);
}
h1{
  font-size:30px;
}
select,button{
  width:100%;
  margin-top:18px;
  padding:16px;
  font-size:20px;
  border:none;
  border-radius:14px;
}
button{
  background:#00ffcc;
  color:#000;
  font-weight:900;
}
.small{
  color:#bbb;
  margin-top:18px;
}
</style>
</head>

<body>

<div class="box">

  <h1>鑑定理論へようこそ🐰</h1>

  <p>勉強する番号を選択してね</p>

  <select id="studyNo"></select>

  <button onclick="goStudy()">
    この論点を勉強する
  </button>

  <p class="small">
    SS〜EEで囲った部分は赤シート化されます。
  </p>

</div>

<script>
const select = document.getElementById("studyNo");

for(let i=1;i<=100;i++){
  const option = document.createElement("option");
  option.value = i;
  option.textContent = `論点 ${i}`;
  select.appendChild(option);
}

function goStudy(){
  const no = select.value;
  location.href = `viewer2.html?no=${no}`;
}
</script>

</body>
</html>
